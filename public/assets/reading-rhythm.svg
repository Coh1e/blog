<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-label="Bar chart of books finished per month over two years">
  <style>
    .axis { stroke: #b8b8b8; stroke-width: 1; }
    .bar  { fill: #4a4a4a; }
    .barL { fill: #d8d8d8; }
    .lbl  { font: 11px Inter, system-ui, sans-serif; fill: #b8b8b8; }
    .yr   { font: 12px Inter, system-ui, sans-serif; fill: #4a4a4a; font-weight: 600; }
  </style>
  <!-- baseline -->
  <line class="axis" x1="40" y1="200" x2="680" y2="200"/>

  <!-- 2024: lighter bars (47 books) -->
  <text class="yr" x="40"  y="34">2024 — 47 books</text>
  <g transform="translate(40, 50)">
    <rect class="barL" x="0"   y="100" width="20" height="50"/>
    <rect class="barL" x="26"  y="80"  width="20" height="70"/>
    <rect class="barL" x="52"  y="60"  width="20" height="90"/>
    <rect class="barL" x="78"  y="40"  width="20" height="110"/>
    <rect class="barL" x="104" y="55"  width="20" height="95"/>
    <rect class="barL" x="130" y="70"  width="20" height="80"/>
    <rect class="barL" x="156" y="85"  width="20" height="65"/>
    <rect class="barL" x="182" y="50"  width="20" height="100"/>
    <rect class="barL" x="208" y="65"  width="20" height="85"/>
    <rect class="barL" x="234" y="75"  width="20" height="75"/>
    <rect class="barL" x="260" y="50"  width="20" height="100"/>
    <rect class="barL" x="286" y="60"  width="20" height="90"/>
  </g>

  <!-- 2025: darker bars (22 books, fewer + chunkier) -->
  <text class="yr" x="380" y="34">2025 — 22 books</text>
  <g transform="translate(380, 50)">
    <rect class="bar" x="0"   y="120" width="20" height="30"/>
    <rect class="bar" x="26"  y="130" width="20" height="20"/>
    <rect class="bar" x="52"  y="100" width="20" height="50"/>
    <rect class="bar" x="78"  y="125" width="20" height="25"/>
    <rect class="bar" x="104" y="115" width="20" height="35"/>
    <rect class="bar" x="130" y="130" width="20" height="20"/>
    <rect class="bar" x="156" y="120" width="20" height="30"/>
    <rect class="bar" x="182" y="110" width="20" height="40"/>
    <rect class="bar" x="208" y="125" width="20" height="25"/>
    <rect class="bar" x="234" y="100" width="20" height="50"/>
    <rect class="bar" x="260" y="115" width="20" height="35"/>
    <rect class="bar" x="286" y="120" width="20" height="30"/>
  </g>

  <!-- month labels (J F M A M J J A S O N D) under both -->
  <g class="lbl">
    <text x="50"  y="220" text-anchor="middle">J</text>
    <text x="76"  y="220" text-anchor="middle">F</text>
    <text x="102" y="220" text-anchor="middle">M</text>
    <text x="128" y="220" text-anchor="middle">A</text>
    <text x="154" y="220" text-anchor="middle">M</text>
    <text x="180" y="220" text-anchor="middle">J</text>
    <text x="206" y="220" text-anchor="middle">J</text>
    <text x="232" y="220" text-anchor="middle">A</text>
    <text x="258" y="220" text-anchor="middle">S</text>
    <text x="284" y="220" text-anchor="middle">O</text>
    <text x="310" y="220" text-anchor="middle">N</text>
    <text x="336" y="220" text-anchor="middle">D</text>
    <text x="390"  y="220" text-anchor="middle">J</text>
    <text x="416"  y="220" text-anchor="middle">F</text>
    <text x="442" y="220" text-anchor="middle">M</text>
    <text x="468" y="220" text-anchor="middle">A</text>
    <text x="494" y="220" text-anchor="middle">M</text>
    <text x="520" y="220" text-anchor="middle">J</text>
    <text x="546" y="220" text-anchor="middle">J</text>
    <text x="572" y="220" text-anchor="middle">A</text>
    <text x="598" y="220" text-anchor="middle">S</text>
    <text x="624" y="220" text-anchor="middle">O</text>
    <text x="650" y="220" text-anchor="middle">N</text>
    <text x="676" y="220" text-anchor="middle">D</text>
  </g>
</svg>
